<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <rect width="1200" height="900" fill="#f3f4f6"/>
  
  <!-- Título -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#374151" text-anchor="middle">
    Planta do Sítio da Arca
  </text>
  
  <!-- Instruções -->
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">
    Substitua esta imagem pela planta real do sítio
  </text>
  
  <!-- Área simulada do sítio -->
  <rect x="100" y="150" width="1000" height="700" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2" rx="10"/>
  
  <!-- Áreas simuladas -->
  <rect x="150" y="200" width="200" height="150" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="5"/>
  <text x="250" y="240" font-family="Arial" font-size="16" fill="#1e40af" text-anchor="middle" font-weight="bold">Entrada</text>
  
  <rect x="400" y="200" width="300" height="200" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="550" y="240" font-family="Arial" font-size="16" fill="#92400e" text-anchor="middle" font-weight="bold">Área Principal</text>
  
  <rect x="750" y="200" width="250" height="180" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="875" y="240" font-family="Arial" font-size="16" fill="#065f46" text-anchor="middle" font-weight="bold">Área Verde</text>
  
  <rect x="150" y="400" width="400" height="250" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="2" rx="5"/>
  <text x="350" y="440" font-family="Arial" font-size="16" fill="#5b21b6" text-anchor="middle" font-weight="bold">Área de Obras</text>
  
  <rect x="600" y="400" width="400" height="300" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="5"/>
  <text x="800" y="440" font-family="Arial" font-size="16" fill="#9f1239" text-anchor="middle" font-weight="bold">Área de Lazer</text>
  
  <!-- Nota -->
  <text x="600" y="850" font-family="Arial" font-size="14" fill="#9ca3af" text-anchor="middle">
    Adicione a imagem real em: /public/images/mapa-sitio-arca.jpg
  </text>
</svg>
