<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo - grama -->
  <rect width="1400" height="1000" fill="#86c995"/>
  
  <!-- Caminhos/estradas -->
  <path d="M 200 100 L 200 900 M 500 100 L 500 900 M 800 100 L 800 900 M 1100 100 L 1100 900" 
        stroke="#d4a574" stroke-width="8" fill="none" opacity="0.6"/>
  <path d="M 100 200 L 1300 200 M 100 400 L 1300 400 M 100 600 L 1300 600 M 100 800 L 1300 800" 
        stroke="#d4a574" stroke-width="8" fill="none" opacity="0.6"/>
  
  <!-- Título -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1f2937" text-anchor="middle">
    Sítio da Arca - Planta
  </text>
  
  <!-- Setor 1: Casa Principal (canto superior esquerdo) -->
  <g id="casa-principal">
    <rect x="150" y="120" width="280" height="200" fill="#e5e7eb" stroke="#374151" stroke-width="3" rx="5"/>
    <rect x="170" y="140" width="80" height="60" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
    <rect x="270" y="140" width="80" height="60" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
    <rect x="370" y="140" width="50" height="60" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
    <rect x="170" y="220" width="120" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <rect x="310" y="220" width="110" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="290" y="110" font-family="Arial" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">Casa Principal</text>
  </g>
  
  <!-- Setor 2: Estacionamento (4 setores - canto superior direito) -->
  <g id="estacionamento">
    <!-- Setor 1 -->
    <rect x="550" y="120" width="120" height="80" fill="#9ca3af" stroke="#4b5563" stroke-width="2" rx="3"/>
    <rect x="560" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="595" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="630" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="665" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    
    <!-- Setor 2 -->
    <rect x="550" y="220" width="120" height="80" fill="#9ca3af" stroke="#4b5563" stroke-width="2" rx="3"/>
    <rect x="560" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="595" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="630" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="665" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    
    <!-- Setor 3 -->
    <rect x="700" y="120" width="120" height="80" fill="#9ca3af" stroke="#4b5563" stroke-width="2" rx="3"/>
    <rect x="710" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="745" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="780" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="815" y="130" width="25" height="15" fill="#6b7280" rx="2"/>
    
    <!-- Setor 4 -->
    <rect x="700" y="220" width="120" height="80" fill="#9ca3af" stroke="#4b5563" stroke-width="2" rx="3"/>
    <rect x="710" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="745" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="780" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    <rect x="815" y="230" width="25" height="15" fill="#6b7280" rx="2"/>
    
    <text x="760" y="110" font-family="Arial" font-size="16" font-weight="bold" fill="#1f2937" text-anchor="middle">Estacionamento</text>
  </g>
  
  <!-- Setor 3: Área de Shows (centro esquerdo) -->
  <g id="area-shows">
    <ellipse cx="300" cy="500" rx="180" ry="120" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <circle cx="300" cy="500" r="60" fill="#fbbf24" opacity="0.6"/>
    <rect x="250" y="480" width="100" height="40" fill="#92400e" rx="5"/>
    <text x="300" y="420" font-family="Arial" font-size="18" font-weight="bold" fill="#78350f" text-anchor="middle">Área de Shows</text>
    <!-- Assentos -->
    <circle cx="220" cy="460" r="8" fill="#d97706"/>
    <circle cx="240" cy="450" r="8" fill="#d97706"/>
    <circle cx="260" cy="445" r="8" fill="#d97706"/>
    <circle cx="340" cy="445" r="8" fill="#d97706"/>
    <circle cx="360" cy="450" r="8" fill="#d97706"/>
    <circle cx="380" cy="460" r="8" fill="#d97706"/>
  </g>
  
  <!-- Setor 4: Ateliê (centro direito) -->
  <g id="atelie">
    <rect x="900" y="420" width="200" height="160" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="3" rx="5"/>
    <rect x="920" y="440" width="60" height="50" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
    <rect x="1000" y="440" width="60" height="50" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
    <rect x="1080" y="440" width="60" height="50" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/>
    <rect x="920" y="510" width="160" height="50" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
    <circle cx="1050" cy="535" r="15" fill="#a78bfa"/>
    <text x="1000" y="410" font-family="Arial" font-size="18" font-weight="bold" fill="#5b21b6" text-anchor="middle">Ateliê</text>
  </g>
  
  <!-- Setor 5: Piscina (centro inferior) -->
  <g id="piscina">
    <ellipse cx="700" cy="750" rx="200" ry="120" fill="#0ea5e9" stroke="#0284c7" stroke-width="4" opacity="0.9"/>
    <!-- Ondas na piscina -->
    <path d="M 500 750 Q 550 740, 600 750 T 700 750 T 800 750 T 900 750" 
          stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 520 780 Q 570 770, 620 780 T 720 780 T 820 780 T 880 780" 
          stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Deck ao redor -->
    <ellipse cx="700" cy="750" rx="220" ry="140" fill="#d4a574" stroke="#b45309" stroke-width="2" opacity="0.7"/>
    <!-- Espreguiçadeiras -->
    <rect x="550" y="720" width="30" height="15" fill="#fef3c7" rx="2" transform="rotate(-20 565 727)"/>
    <rect x="850" y="720" width="30" height="15" fill="#fef3c7" rx="2" transform="rotate(20 865 727)"/>
    <text x="700" y="680" font-family="Arial" font-size="18" font-weight="bold" fill="#0c4a6e" text-anchor="middle">Piscina</text>
  </g>
  
  <!-- Setor 6: Espaço Vivência (canto inferior esquerdo) -->
  <g id="espaco-vivencia">
    <rect x="120" y="720" width="300" height="200" fill="#fce7f3" stroke="#ec4899" stroke-width="3" rx="10"/>
    <!-- Área coberta -->
    <rect x="140" y="740" width="260" height="60" fill="#fbcfe8" stroke="#db2777" stroke-width="2" rx="5"/>
    <!-- Mesas -->
    <circle cx="200" cy="770" r="20" fill="#f9a8d4"/>
    <circle cx="280" cy="770" r="20" fill="#f9a8d4"/>
    <circle cx="360" cy="770" r="20" fill="#f9a8d4"/>
    <!-- Área verde -->
    <ellipse cx="250" cy="850" rx="80" ry="50" fill="#86c995" opacity="0.7"/>
    <ellipse cx="320" cy="880" rx="60" ry="40" fill="#86c995" opacity="0.7"/>
    <!-- Árvores -->
    <circle cx="180" cy="820" r="15" fill="#22c55e"/>
    <circle cx="180" cy="820" r="10" fill="#16a34a"/>
    <circle cx="380" cy="840" r="15" fill="#22c55e"/>
    <circle cx="380" cy="840" r="10" fill="#16a34a"/>
    <text x="270" y="710" font-family="Arial" font-size="18" font-weight="bold" fill="#9f1239" text-anchor="middle">Espaço Vivência</text>
  </g>
  
  <!-- Árvores decorativas pelo sítio -->
  <g id="arvores">
    <circle cx="450" cy="350" r="20" fill="#22c55e"/>
    <circle cx="450" cy="350" r="15" fill="#16a34a"/>
    <rect x="445" y="370" width="10" height="15" fill="#92400e"/>
    
    <circle cx="1100" cy="350" r="20" fill="#22c55e"/>
    <circle cx="1100" cy="350" r="15" fill="#16a34a"/>
    <rect x="1095" y="370" width="10" height="15" fill="#92400e"/>
    
    <circle cx="500" cy="650" r="20" fill="#22c55e"/>
    <circle cx="500" cy="650" r="15" fill="#16a34a"/>
    <rect x="495" y="670" width="10" height="15" fill="#92400e"/>
    
    <circle cx="1000" cy="650" r="20" fill="#22c55e"/>
    <circle cx="1000" cy="650" r="15" fill="#16a34a"/>
    <rect x="995" y="670" width="10" height="15" fill="#92400e"/>
  </g>
  
  <!-- Norte -->
  <g id="norte" transform="translate(50, 50)">
    <path d="M 0 0 L 10 20 L -10 20 Z" fill="#ef4444"/>
    <text x="0" y="40" font-family="Arial" font-size="14" font-weight="bold" fill="#1f2937" text-anchor="middle">N</text>
  </g>
</svg>
